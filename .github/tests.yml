name: CI - Lista 02

on:
  pull_request:
  push:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🔒 Verificar alterações nos testes
        run: |
          CHANGED_TESTS=$(git diff --name-only HEAD~1 | grep '^tests/' || true)
          if [ ! -z "$CHANGED_TESTS" ]; then
            echo "❌ Não é permitido alterar os testes!"
            echo "$CHANGED_TESTS"
            exit 1
          fi

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt

      - name: 🎛 Rodar linter (flake8)
        run: flake8 src tests

      - name: 🧪 Rodar testes
        run: pytest -v
